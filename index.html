<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. - Servidor Groq Directo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0f1d;
            color: #00f3ff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 600px;
            background: #111a2e;
            border: 1px solid #00f3ff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }
        h1 { font-size: 24px; text-align: center; margin-bottom: 15px; letter-spacing: 2px; }
        .console {
            background: #050914;
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            border-radius: 5px;
            margin-bottom: 15px;
            font-family: monospace;
            font-size: 14px;
        }
        .msg { margin-bottom: 10px; }
        .user-text { color: #ffffff; }
        .jarvis-text { color: #00f3ff; font-weight: bold; }
        .system-text { color: #ffbb00; }
        .error-text { color: #ff0055; font-weight: bold; }
        .input-box { display: flex; gap: 10px; }
        input[type="text"] {
            flex-grow: 1;
            background: #050914;
            border: 1px solid #00f3ff;
            color: #ffffff;
            padding: 10px;
            border-radius: 5px;
            font-size: 15px;
            outline: none;
        }
        button {
            background: #00f3ff;
            color: #0a0f1d;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #ffffff; }
        .reset-link { text-align: center; margin-top: 15px; font-size: 12px; color: #4a7a96; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <h1>J.A.R.V.I.S.</h1>
        <div class="console" id="console"></div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Cargando sistema..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
        </div>
        <div class="reset-link" id="resetBtn">Borrar llave guardada</div>
    </div>

    <script>
        let GROQ_API_KEY = "";
        let necesitaKey = true;

        const consoleDiv = document.getElementById('console');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const resetBtn = document.getElementById('resetBtn');

        function logPantalla(texto, clase) {
            const p = document.createElement('div');
            p.className = `msg ${clase}`;
            p.innerText = texto;
            consoleDiv.appendChild(p);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        function hablar(texto) {
            logPantalla("JARVIS: " + texto, "jarvis-text");
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-MX';
            window.speechSynthesis.speak(utterance);
        }

        function inicializarSistema() {
            GROQ_API_KEY = localStorage.getItem("jarvis_groq_key");

            if (GROQ_API_KEY) {
                necesitaKey = false;
                userInput.placeholder = "Hable con J.A.R.V.I.S...";
                setTimeout(() => { hablar("Sistemas centrales conectados mediante Groq, señor. ¿Qué desea?"); }, 500);
            } else {
                necesitaKey = true;
                userInput.placeholder = "Pegue su API Key de Groq...";
                logPantalla("SISTEMA: Ingrese la API Key de Groq (empieza con gsk_) para iniciar el cerebro.", "system-text");
            }
        }

        async function preguntarAGroq(preguntaUsuario) {
            const url = "https://api.groq.com/openai/v1/chat/completions";
            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", // ACTUALIZADO AL MODELO NUEVO
                        messages: [
                            { role: "system", content: "Actúa exactamente como J.A.R.V.I.S., el asistente de Iron Man. Habla siempre en español, de forma muy concisa, educada y dirígete al usuario como 'señor'. Nunca uses formatos markdown como asteriscos o negritas." },
                            { role: "user", content: preguntaUsuario }
                        ]
                    })
                });
                
                const data = await response.json();
                if (data.error) {
                    logPantalla(`ERROR GROQ: ${data.error.message}`, "error-text");
                } else if (data.choices && data.choices[0].message.content) {
                    hablar(data.choices[0].message.content.trim());
                }
            } catch (error) {
                logPantalla("ERROR: No se pudo conectar con el servidor de Groq.", "error-text");
            }
        }

        function mandarComando() {
            let texto = userInput.value.trim();
            if (texto === "") return;

            if (necesitaKey) {
                GROQ_API_KEY = texto;
                localStorage.setItem("jarvis_groq_key", texto);
                userInput.value = "";
                necesitaKey = false;
                userInput.placeholder = "Hable con J.A.R.V.I.S...";
                logPantalla("SISTEMA: Cerebro conectado con éxito.", "system-text");
                hablar("Todos los sistemas principales en línea, señor.");
                return;
            }

            logPantalla("TÚ: " + texto, "user-text");
            userInput.value = "";
            preguntarAGroq(texto);
        }

        resetBtn.addEventListener('click', () => {
            localStorage.clear();
            GROQ_API_KEY = "";
            consoleDiv.innerHTML = "";
            necesitaKey = true;
            userInput.placeholder = "Pegue su API Key de Groq...";
            logPantalla("SISTEMA: Memoria limpia. Ingrese la nueva API Key de Groq.", "system-text");
        });

        sendBtn.addEventListener('click', mandarComando);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') mandarComando(); });

        window.onload = inicializarSistema;
    </script>
</body>
</html>
