<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. - Modular v4.0</title>
    <!-- Vinculamos el archivo de estilos externos -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>J.A.R.V.I.S.</h1>
        <div class="subtitle">Núcleo Modular v4.0</div>
        <div class="jarvis-arc"><div class="jarvis-arc-inner"></div></div>
        <div class="console" id="console"></div>
        <div class="input-box">
            <input type="text" id="userInput" placeholder="Esperando configuración..." autocomplete="off">
            <button id="sendBtn">Enviar</button>
        </div>
        <div class="reset-link" id="resetBtn">Borrar API Key guardada</div>
    </div>

    <!-- Cargamos los scripts de JavaScript: primero la voz y luego el cerebro -->
    <script src="voz.js"></script>
    <script src="script.js"></script>
</body>
</html>
